<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road of Vietnam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #ce1126; /* Red from Vietnamese Flag */
            color: white;
            padding: 20px;
            text-align: center;
        }
        .flag {
            width: 50px;
            height: auto;
            margin: 0 auto;
        }
        .content {
            padding: 20px;
        }
        .button {
            background-color: #ffde00; /* Yellow from Vietnamese Flag */
            border: none;
            padding: 10px 20px;
            color: #333;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background-color: #ce1126;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Road Status Monitoring System</h1>
        <img src="vietnam-flag.png" alt="Vietnam Flag" class="flag">
    </header>
    <div class="content">
        <h2>Monitor Road Status</h2>
        <button class="button">Report Incident</button>
        <button class="button">View Statistics</button>
        <button class="button">Search Road Conditions</button>
        <p>Stay updated with the latest road conditions in Vietnam!</p>
    </div>
    <footer>
        <p>&copy; 2026 Road of Vietnam</p>
    </footer>
</body>
</html>
